<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oyster's LAB — Гастрономический Гид</title>
    <meta name="description" content="Гастрономический гид по устрицам и винам Oyster's LAB.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');

        :root {
            --bg:        #060a10;
            --bg-card:   #0c1118;
            --surface:   #111820;
            --surface-2: #171f2a;
            --surface-3: #1f2b3a;
            --gold:      #d4b062;
            --gold-light:#e8cc8a;
            --gold-dim:  rgba(212,176,98,0.08);
            --gold-line: rgba(212,176,98,0.18);
            --gold-glow: rgba(212,176,98,0.04);
            --text:      #f0ece4;
            --text-sec:  #c8c0b4;
            --muted:     #7a8fa3;
            --faint:     #1a222e;
            --header-brand: #6ba39f;
            --body-text: #b8c4d0;
            --radius:    20px;
            --radius-sm: 14px;
            --radius-xs: 10px;

            --green:     #6bcf8e;
            --fs-xs:     0.75rem;
            --fs-sm:     0.875rem;
            --fs-base:   1rem;
            --fs-md:     1.25rem;
            --fs-lg:     1.563rem;
            --fs-xl:     2.9rem;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        select, input, textarea, button {
            font-family: inherit;
            color-scheme: dark;
        }
        select option { background: var(--bg-card); color: var(--text); }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: var(--fs-base);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        .shell { width: 100%; max-width: 480px; min-height: 100vh; position: relative; overflow-x: hidden; }

        .shell::before {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 480px; height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,176,98,0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        header {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--faint);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6,10,16,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .brand { display: flex; flex-direction: column; }
        .brand h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-lg);
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
        }
        .brand p {
            font-size: var(--fs-xs);
            color: var(--header-brand);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .lang-switch {
            display: inline-flex;
            gap: 3px;
            background: var(--surface);
            padding: 4px;
            border-radius: 24px;
            border: 1px solid var(--faint);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(138, 159, 186, 0.4);
            font-size: var(--fs-xs);
            font-weight: 700;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .lang-btn:hover:not(.active) { color: var(--muted); }

        .lang-btn.active {
            background: var(--gold-dim);
            color: var(--gold);
            border-color: var(--gold-line);
        }

        /* ─── NAV TABS ─── */
        .main-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--faint);
            color: var(--muted);
            font-size: var(--fs-sm);
            font-weight: 600;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            letter-spacing: 0.02em;
        }

        .nav-btn:hover { border-color: var(--gold-line); color: var(--text); }
        .nav-btn.active {
            background: var(--gold-dim);
            color: var(--gold-light);
            border-color: var(--gold-line);
        }

        .nav-icon { font-size: var(--fs-base); }

        /* ─── FILTERS ─── */
        .filters-section {
            padding: 14px 20px 0;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: var(--surface);
            border: 1px solid var(--faint);
            color: var(--muted);
            font-size: var(--fs-sm);
            font-weight: 600;
            padding: 9px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .filter-chip:hover { border-color: var(--gold-line); color: var(--text); }
        .filter-chip.active {
            background: var(--gold-dim);
            color: var(--gold-light);
            border-color: var(--gold-line);
        }

        /* ─── OYSTER TABS ─── */
        .tabs-wrapper { position: relative; }
        .tabs-wrapper::after {
            content: ''; position: absolute;
            right: 0; top: 0; bottom: 0; width: 44px;
            background: linear-gradient(90deg, transparent, var(--bg));
            pointer-events: none;
        }
        .tabs {
            display: flex; overflow-x: auto;
            padding: 12px 20px; gap: 8px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            background: var(--surface); color: var(--muted);
            border: 1px solid var(--faint);
            padding: 10px 20px; border-radius: 20px;
            white-space: nowrap; font-size: var(--fs-sm); font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
            flex-shrink: 0; user-select: none;
            letter-spacing: 0.02em;
        }
        .tab:hover { border-color: var(--gold-line); color: var(--text); }
        .tab.active { background: var(--gold-dim); color: var(--gold-light); border-color: var(--gold-line); }

        /* ─── CARDS ─── */
        .card {
            display: none;
            padding: 0 20px 80px;
            animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .card.active { display: block; }
        .card .info-block { position: relative; z-index: 1; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* hero */
        .hero { text-align: center; padding: 28px 0 20px; position: relative; z-index: 1; }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(212,176,98,0.12), rgba(212,176,98,0.06));
            color: var(--gold-light);
            border: 1px solid rgba(212,176,98,0.25);
            padding: 7px 18px; border-radius: 20px;
            font-size: var(--fs-xs); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 16px;
        }
        .oyster-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-xl); font-weight: 600;
            letter-spacing: 1px; line-height: 1.1; margin-bottom: 16px;
            color: var(--text);
        }

        .price-tag {
            display: inline-flex; align-items: baseline; gap: 6px;
            margin-bottom: 14px;
            background: var(--gold-dim);
            padding: 10px 24px;
            border-radius: 24px;
            border: 1px solid var(--gold-line);
        }
        .price-amount { font-size: var(--fs-lg); font-weight: 800; color: var(--gold-light); }
        .price-unit   { font-size: var(--fs-sm); color: var(--muted); font-weight: 500; }
        .terroir {
            font-size: var(--fs-sm); color: var(--muted);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            letter-spacing: 0.02em;
        }
        .terroir-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); opacity: 0.5; }

        /* block */
        .info-block {
            background: var(--bg-card);
            border: 1px solid var(--faint);
            border-radius: var(--radius); padding: 20px;
            margin-bottom: 14px;
        }
        .block-label {
            font-size: var(--fs-xs); font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        .block-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-line), transparent);
        }

        /* taste bars */
        .taste-row { margin-bottom: 18px; }
        .taste-meta { display: flex; justify-content: space-between; font-size: var(--fs-base); margin-bottom: 8px; }
        .taste-label { font-weight: 600; color: var(--text-sec); }
        .taste-score { color: var(--gold-light); font-weight: 700; font-variant-numeric: tabular-nums; }
        .bar-track { height: 7px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(212,176,98,0.4), var(--gold));
            border-radius: 4px; width: 0%;
            transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
        }
        .scale-hint {
            display: flex; justify-content: space-between;
            font-size: var(--fs-xs); font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: 8px;
        }

        /* radar chart */
        .radar-wrap {
            display: flex; justify-content: center;
            padding: 10px 0 6px;
        }
        .radar-svg { width: 220px; height: 220px; }
        .radar-grid { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 1; }
        .radar-axis { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
        .radar-shape { fill: rgba(212,176,98,0.15); stroke: var(--gold); stroke-width: 2; }
        .radar-dot { fill: var(--gold-light); }
        .radar-label { font-size: 10px; font-weight: 600; fill: var(--muted); text-anchor: middle; }

        /* description */
        .desc {
            font-size: var(--fs-md);
            line-height: 1.75;
            color: var(--body-text);
            margin-bottom: 18px;
            font-weight: 400;
            letter-spacing: 0.01em;
            padding: 6px 0;
        }
        .desc strong {
            color: var(--text);
            font-weight: 700;
        }

        /* origin */
        .origin-map-line {
            display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--faint);
        }
        .origin-flag {
            font-size: 28px; flex-shrink: 0;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-2);
            border-radius: 12px;
        }
        .origin-place { font-size: var(--fs-base); font-weight: 700; color: var(--text); line-height: 1.3; }
        .origin-region { font-size: var(--fs-sm); color: var(--muted); margin-top: 3px; letter-spacing: 0.02em; }
        .origin-text {
            font-size: var(--fs-base); line-height: 1.75; color: var(--body-text);
            font-weight: 400;
        }
        .origin-text strong { color: var(--text); font-weight: 600; }

        /* facts */
        .facts-list { display: flex; flex-direction: column; gap: 10px; }
        .fact-item {
            display: flex; gap: 12px; align-items: flex-start;
            background: var(--surface-2); border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-xs); padding: 14px 16px;
        }
        .fact-num {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--gold-dim); border: 1px solid var(--gold-line);
            color: var(--gold-light); font-size: var(--fs-xs); font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 2px;
        }
        .fact-text {
            font-size: var(--fs-base); line-height: 1.65; color: var(--body-text);
        }
        .fact-text strong { color: var(--text); font-weight: 600; }

        /* pairing */
        .pairing-intro {
            font-size: var(--fs-sm); color: var(--muted); line-height: 1.65;
            margin-bottom: 18px;
            font-style: italic;
        }
        .drink-list { display: flex; flex-direction: column; gap: 12px; }
        .drink-card {
            display: flex; align-items: flex-start; gap: 14px;
            background: var(--surface-2); border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-sm); padding: 16px;
            transition: all 0.25s ease;
        }
        .drink-card:hover {
            border-color: var(--gold-line);
            background: rgba(212,176,98,0.04);
        }
        .drink-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .drink-icon.white   { background: rgba(255,235,160,0.08); }
        .drink-icon.bubb    { background: rgba(210,190,255,0.08); }
        .drink-icon.rose    { background: rgba(255,160,160,0.08); }
        .drink-icon.sake    { background: rgba(160,230,200,0.08); }
        .drink-icon.mineral { background: rgba(140,200,255,0.08); }
        .drink-name   { font-size: var(--fs-base); font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.35; }
        .drink-why    { font-size: var(--fs-sm); color: var(--muted); line-height: 1.55; }
        .drink-tag {
            display: inline-block;
            background: var(--gold-dim); color: var(--gold-light);
            border: 1px solid var(--gold-line);
            padding: 4px 12px; border-radius: 8px;
            font-size: var(--fs-xs); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: 8px; white-space: nowrap;
        }

        /* ─── WINE SECTION ─── */
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-lg); font-weight: 600;
            padding: 24px 20px 12px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .wine-grid {
            padding: 0 20px 80px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .wine-card {
            background: var(--bg-card);
            border: 1px solid var(--faint);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .wine-card:hover { border-color: var(--gold-line); }

        .wine-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }

        .wine-name {
            font-size: var(--fs-base); font-weight: 700; color: var(--text);
            line-height: 1.35;
        }

        .wine-type-badge {
            font-size: var(--fs-xs); font-weight: 700;
            padding: 5px 12px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.06em;
            flex-shrink: 0; margin-left: 8px;
        }
        .wine-type-badge.white   { background: rgba(255,235,160,0.10); color: var(--gold-light); }
        .wine-type-badge.red     { background: rgba(224,122,122,0.10); color: #e07a7a; }
        .wine-type-badge.rose    { background: rgba(255,160,160,0.10); color: #ffa0a0; }
        .wine-type-badge.spark   { background: rgba(210,190,255,0.10); color: #d2beff; }
        .wine-type-badge.dessert { background: rgba(255,200,120,0.10); color: #ffc878; }

        .wine-region {
            font-size: var(--fs-sm); color: var(--muted); margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .wine-desc {
            font-size: var(--fs-sm); color: var(--body-text); line-height: 1.65;
            margin-bottom: 14px;
            font-weight: 400;
        }

        .wine-oysters {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding-top: 12px;
            border-top: 1px solid var(--faint);
        }

        .wine-oyster-tag {
            font-size: var(--fs-xs); font-weight: 600;
            padding: 5px 12px; border-radius: 8px;
            background: var(--gold-dim); color: var(--gold-light);
            border: 1px solid var(--gold-line);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .wine-oyster-tag:hover {
            background: var(--gold-line);
            color: var(--text);
        }

        /* quiz trigger */
        .action-bar {
            display: flex; gap: 8px; padding: 16px 20px 8px;
            justify-content: center;
        }
        .action-btn {
            background: var(--surface);
            border: 1px solid var(--faint);
            color: var(--muted);
            font-size: var(--fs-sm); font-weight: 600;
            padding: 12px 20px; border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.25s ease;
            display: flex; align-items: center; gap: 8px;
            letter-spacing: 0.02em;
        }
        .action-btn:hover { border-color: var(--gold-line); color: var(--text); }

        /* compare overlay */
        .compare-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6,10,16,0.92);
            z-index: 200; display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(12px);
        }
        .compare-overlay.active { display: flex; }
        .compare-panel {
            width: 100%; max-width: 440px;
            background: var(--bg-card); border: 1px solid var(--faint);
            border-radius: var(--radius); padding: 20px;
            margin: 16px; max-height: 90vh; overflow-y: auto;
        }
        .compare-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .compare-panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-lg); font-weight: 600; color: var(--text);
        }
        .compare-close {
            background: var(--surface); border: 1px solid var(--faint);
            color: var(--muted); width: 34px; height: 34px;
            border-radius: var(--radius-xs); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s ease;
        }
        .compare-close:hover { border-color: var(--gold-line); color: var(--text); }
        .compare-selects {
            display: flex; gap: 8px; margin-bottom: 14px;
        }
        .compare-select {
            flex: 1; background: var(--surface); border: 1px solid var(--faint);
            border-radius: var(--radius-xs); padding: 11px 12px;
            font-size: var(--fs-sm); color: var(--text);
            font-family: 'DM Sans', sans-serif; appearance: none;
            cursor: pointer; color-scheme: dark;
        }
        .compare-select option { background: var(--bg-card); color: var(--text); }
        .compare-select:focus { outline: none; border-color: var(--gold-line); }
        .compare-go-btn {
            width: 100%; background: var(--gold-dim); border: 1px solid var(--gold-line);
            color: var(--gold-light); font-size: var(--fs-sm); font-weight: 700;
            padding: 13px; border-radius: var(--radius-sm); cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.2s ease;
            margin-bottom: 16px;
        }
        .compare-go-btn:hover { background: var(--gold-line); color: var(--text); }
        .compare-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .compare-col {
            background: var(--surface); border: 1px solid var(--faint);
            border-radius: var(--radius-sm); padding: 14px; text-align: center;
        }
        .compare-col-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-md); font-weight: 600;
            color: var(--text); margin-bottom: 2px;
        }
        .compare-col-price {
            font-size: var(--fs-sm); color: var(--gold-light); font-weight: 700;
            margin-bottom: 10px;
        }
        .compare-row {
            display: flex; justify-content: space-between;
            padding: 7px 0; border-bottom: 1px solid var(--faint);
            font-size: var(--fs-sm);
        }
        .compare-row:last-child { border-bottom: none; }
        .compare-label { color: var(--muted); }
        .compare-val { font-weight: 700; color: var(--text); }
        .compare-val.winner { color: var(--gold-light); }

        /* quiz overlay */
        .quiz-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6,10,16,0.95);
            z-index: 250; display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(16px);
        }
        .quiz-overlay.active { display: flex; }
        .quiz-card {
            width: 100%; max-width: 420px;
            background: var(--bg-card); border: 1px solid var(--faint);
            border-radius: var(--radius); padding: 28px 24px;
            margin: 16px; position: relative;
        }
        .quiz-close {
            position: absolute; top: 16px; right: 16px;
            background: var(--surface); border: 1px solid var(--faint);
            color: var(--muted); width: 34px; height: 34px;
            border-radius: var(--radius-xs); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s ease;
        }
        .quiz-close:hover { border-color: var(--gold-line); color: var(--text); }
        .quiz-progress {
            height: 3px; background: var(--faint); border-radius: 2px;

let currentWineFilter = 'all';
let quizStep = 0;
let quizAnswers = [];

function renderTabs() {
    const t = UI[currentLang];
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = OYSTERS.map(o => `
        <button class="tab" data-target="${o.id}">${o.name}</button>
    `).join('');
}

function buildRadarSVG(o) {
    const cx = 110, cy = 110, maxR = 60;
    const keys = ['sal', 'iod', 'sw', 'meat'];
    const n = 4;
    const angleStep = (2 * Math.PI) / n;
    const startAngle = -Math.PI / 2;

    function polarToXY(angle, r) {
        return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
    }

    function polyPoints(r) {
        return keys.map((_, i) => {
            const p = polarToXY(startAngle + i * angleStep, r);
            return `${p.x},${p.y}`;
        }).join(' ');
    }

    const gridLines = [0.33, 0.66, 1].map(scale => {
        return `<polygon class="radar-grid" points="${polyPoints(maxR * scale)}"/>`;
    }).join('');

    const axes = keys.map((_, i) => {
        const p = polarToXY(startAngle + i * angleStep, maxR);
        return `<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}"/>`;
    }).join('');

    const dataPoints = keys.map((k, i) => {
        const r = (o[k] / 10) * maxR;
        const p = polarToXY(startAngle + i * angleStep, r);
        return p;
    });

    const shapePoints = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
    const shape = `<polygon class="radar-shape" points="${shapePoints}"/>`;

    const dots = dataPoints.map(p => `<circle class="radar-dot" cx="${p.x}" cy="${p.y}" r="3"/>`).join('');

    const t = UI[currentLang];
    const labels = [
        { key: 'sal', name: t.sal },
        { key: 'iod', name: t.iod },
        { key: 'sw', name: t.sw },
        { key: 'meat', name: t.meat }
    ];
    const labelElems = labels.map((lb, i) => {
        const p = polarToXY(startAngle + i * angleStep, maxR + 18);
        return `<text class="radar-label" x="${p.x}" y="${p.y}">${lb.name}</text>`;
    }).join('');

    return `<div class="radar-wrap"><svg class="radar-svg" viewBox="0 0 220 220">${gridLines}${axes}${shape}${dots}${labelElems}</svg></div>`;
}

function renderCards() {
    const t = UI[currentLang];
    const TASTE_LABELS = [
        { key: 'sal',  name: t.sal },
        { key: 'iod',  name: t.iod },
        { key: 'sw',   name: t.sw },
        { key: 'meat', name: t.meat }
    ];

    const container = document.getElementById('cards-container');
    container.innerHTML = OYSTERS.map((o, i) => `
        <div id="card-${o.id}" class="card">
            <div class="hero">
                <span class="badge">${o.badge}</span>
                <h2 class="oyster-name">${o.name}</h2>
                <div class="price-tag">
                    <span class="price-amount">${o.price} MDL</span>
                    <span class="price-unit">${t.unit}</span>
                </div>
                <p class="terroir">
                    <span class="terroir-dot"></span>
                    ${o.terroir[currentLang]}
                </p>
            </div>

            <div class="info-block">
                <div class="block-label">${t.taste}</div>
                ${buildRadarSVG(o)}
                ${TASTE_LABELS.map(lb => `
                    <div class="taste-row" style="margin-bottom:10px">
                        <div class="taste-meta" style="font-size:var(--fs-sm)">
                            <span class="taste-label">${lb.name}</span>
                            <span class="taste-score">${o[lb.key]}/10</span>
                        </div>
                        <div class="bar-track" style="height:4px">
                            <div class="bar-fill" data-val="${o[lb.key] * 10}"></div>
                        </div>
                    </div>
                `).join('')}
                <div class="scale-hint"><span>${t.low}</span><span>${t.high}</span></div>
            </div>

            <p class="desc">${o.desc[currentLang]}</p>

            <div class="info-block">
                <div class="block-label">${t.origin}</div>
                <div class="origin-map-line">
                    <span class="origin-flag">${o.origin.flag}</span>
                    <div>
                        <div class="origin-place">${o.origin.place[currentLang]}</div>
                        <div class="origin-region">${o.origin.region[currentLang]}</div>
                    </div>
                </div>
                <p class="origin-text">${o.origin.text[currentLang]}</p>
            </div>

            <div class="info-block">
                <div class="block-label">${t.pairing}</div>
                <p class="pairing-intro">${o.pairingIntro[currentLang]}</p>
                <div class="drink-list">
                    ${o.drinks.map(d => `
                        <div class="drink-card">
                            <div class="drink-icon ${d.type}">${d.icon}</div>
                            <div>
                                <div class="drink-name">${d.name}</div>
                                <div class="drink-why">${d.why[currentLang]}</div>
                                <span class="drink-tag">${d.tag[currentLang]}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="info-block">
                <div class="block-label">${t.facts}</div>
                <div class="facts-list">
                    ${o.facts[currentLang].map((f, fi) => `
                        <div class="fact-item">
                            <div class="fact-num">${fi + 1}</div>
                            <p class="fact-text">${f}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function renderWineFilters() {
    const t = UI[currentLang];
    const filters = [
        { key: 'all', label: t.all },
        { key: 'white', label: t.white },
        { key: 'rose', label: t.rose },
        { key: 'spark', label: t.sparkling }
    ];
    document.getElementById('wine-filters').innerHTML = filters.map(f => `
        <button class="filter-chip ${f.key === currentWineFilter ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>
    `).join('');
}

function renderWines() {
    const t = UI[currentLang];
    const filtered = currentWineFilter === 'all'
        ? WINES
        : WINES.filter(w => w.type === currentWineFilter);

    const grid = document.getElementById('wine-grid');

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🍷</div><div class="empty-text">Нет вин в этой категории</div></div>`;
        return;
    }

    const typeLabels = {
        white: { ru: 'Белое', ro: 'Alb', en: 'White' },
        rose: { ru: 'Розе', ro: 'Rosé', en: 'Rosé' },
        spark: { ru: 'Игристое', ro: 'Spumant', en: 'Sparkling' }
    };

    grid.innerHTML = filtered.map(w => {
        const pairOysters = w.pairs.map(pid => OYSTERS.find(o => o.id === pid)).filter(Boolean);
        return `
            <div class="wine-card">
                <div class="wine-top">
                    <div class="wine-name">${w.name}</div>
                    <span class="wine-type-badge ${w.type}">${typeLabels[w.type][currentLang]}</span>
                </div>
                <div class="wine-region">${w.region}</div>
                <div class="wine-desc">${w.desc[currentLang]}</div>
                <div class="wine-oysters">
                    ${pairOysters.map(o => `
                        <span class="wine-oyster-tag" data-oyster="${o.id}">${o.name}</span>
                    `).join('')}
                </div>
            </div>
        `;
    }).join('');

    grid.querySelectorAll('.wine-oyster-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            switchSection('oysters');
            setTimeout(() => showOyster(tag.dataset.oyster), 100);
        });
    });
}

function activateBars(cardEl) {
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            cardEl.querySelectorAll('.bar-fill').forEach(b => {
                b.style.width = b.getAttribute('data-val') + '%';
            });
        });
    });
}

function renderCompareSelects() {
    const opts = OYSTERS.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
    const placeholder = UI[currentLang].compare_placeholder;
    document.getElementById('compareSelect1').innerHTML = `<option value="">${placeholder}</option>` + opts;
    document.getElementById('compareSelect2').innerHTML = `<option value="">${placeholder}</option>` + opts;
}

function runCompare() {
    const id1 = document.getElementById('compareSelect1').value;
    const id2 = document.getElementById('compareSelect2').value;
    if (!id1 || !id2 || id1 === id2) return;
    const o1 = OYSTERS.find(o => o.id === id1);
    const o2 = OYSTERS.find(o => o.id === id2);
    const t = UI[currentLang];
    const keys = [
        { key: 'sal', name: t.sal },
        { key: 'iod', name: t.iod },
        { key: 'sw', name: t.sw },
        { key: 'meat', name: t.meat }
    ];
    const result = document.getElementById('compareResult');
    result.innerHTML = `
        <div class="compare-grid">
            <div class="compare-col">
                <div class="compare-col-name">${o1.name}</div>
                <div class="compare-col-price">${o1.price} MDL</div>
                ${keys.map(k => {
                    const w = o1[k.key] >= o2[k.key] ? ' winner' : '';
                    return `<div class="compare-row"><span class="compare-label">${k.name}</span><span class="compare-val${w}">${o1[k.key]}/10</span></div>`;
                }).join('')}
                <div class="compare-row"><span class="compare-label">${t.origin}</span><span class="compare-val">${o1.origin.place[currentLang]}</span></div>
            </div>
            <div class="compare-col">
                <div class="compare-col-name">${o2.name}</div>
                <div class="compare-col-price">${o2.price} MDL</div>
                ${keys.map(k => {
                    const w = o2[k.key] > o1[k.key] ? ' winner' : '';
                    return `<div class="compare-row"><span class="compare-label">${k.name}</span><span class="compare-val${w}">${o2[k.key]}/10</span></div>`;
                }).join('')}
                <div class="compare-row"><span class="compare-label">${t.origin}</span><span class="compare-val">${o2.origin.place[currentLang]}</span></div>
            </div>
        </div>
    `;
}

function renderQuiz() {
    const t = UI[currentLang];
    const overlay = document.getElementById('quizOverlay');
    const card = document.getElementById('quizCard');
    overlay.classList.add('active');

    if (quizStep >= 6) {
        showQuizResult();
        return;
    }

    const questions = [
        { q: t.quiz_q1, opts: [t.quiz_q1a, t.quiz_q1b, t.quiz_q1c], scores: [
            o => o.sal <= 4,
            o => o.sal >= 4 && o.sal <= 6,
            o => o.sal >= 6
        ]},
        { q: t.quiz_q2, opts: [t.quiz_q2a, t.quiz_q2b, t.quiz_q2c], scores: [
            o => (o.sw + o.meat) / 2,
            o => o.meat,
            o => o.iod
        ]},
        { q: t.quiz_q3, opts: [t.quiz_q3a, t.quiz_q3b, t.quiz_q3c], scores: [
            o => o.meat <= 6 && o.sal <= 5,
            o => true,
            o => o.meat >= 8 || o.sw >= 8
        ]},
        { q: t.quiz_q4, opts: [t.quiz_q4a, t.quiz_q4b, t.quiz_q4c], scores: [
            o => o.sal >= 4 && o.sal <= 7,
            o => o.sw >= 6 || o.meat >= 7,
            o => o.sal <= 6 && o.iod <= 6
        ]},
        { q: t.quiz_q5, opts: [t.quiz_q5a, t.quiz_q5b, t.quiz_q5c], scores: [
            o => ['finedeclaire', 'gillardeau', 'speciale'].includes(o.id),
            o => ['gold', 'eleonora', 'amulet', 'boudeuse'].includes(o.id),
            o => true
        ]},
        { q: t.quiz_q6, opts: [t.quiz_q6a, t.quiz_q6b, t.quiz_q6c], scores: [
            o => parseInt(o.price) <= 90,
            o => parseInt(o.price) > 90 && parseInt(o.price) <= 130,
            o => true
        ]}
    ];

    const step = questions[quizStep];
    const progress = ((quizStep) / 6) * 100;

    card.innerHTML = `
        <button class="quiz-close" id="quizCloseBtn">✕</button>
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
        <div class="quiz-title">${t.quiz_title}</div>
        <div class="quiz-subtitle">${t.quiz_sub}</div>
        <div class="quiz-step-label">${quizStep + 1} / 6</div>
        <div class="quiz-question">${step.q}</div>
        <div class="quiz-options">
            ${step.opts.map((opt, i) => `<div class="quiz-opt" data-idx="${i}"><span class="quiz-opt-dot"></span>${opt}</div>`).join('')}
        </div>
    `;

    document.getElementById('quizCloseBtn').addEventListener('click', () => {
        document.getElementById('quizOverlay').classList.remove('active');
        quizStep = 0;
        quizAnswers = [];
    });

    card.querySelectorAll('.quiz-opt').forEach(opt => {
        opt.addEventListener('click', () => {
            card.querySelectorAll('.quiz-opt').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            quizAnswers[quizStep] = parseInt(opt.dataset.idx);
            setTimeout(() => {
                quizStep++;
                renderQuiz();
            }, 300);
        });
    });
}

function showQuizResult() {
    const t = UI[currentLang];
    const card = document.getElementById('quizCard');

    const scored = OYSTERS.map(o => {
        let score = 0;
        if (quizAnswers[0] === 0) score += o.sal <= 4 ? 25 : (o.sal <= 6 ? 12 : 0);
        if (quizAnswers[0] === 1) score += o.sal >= 4 && o.sal <= 6 ? 25 : 12;
        if (quizAnswers[0] === 2) score += o.sal >= 6 ? 25 : (o.sal >= 4 ? 12 : 0);

        if (quizAnswers[1] === 0) score += ((o.sw + o.meat) / 20) * 30;
        if (quizAnswers[1] === 1) score += (o.meat / 10) * 30;
        if (quizAnswers[1] === 2) score += (o.iod / 10) * 30;

        if (quizAnswers[2] === 0) score += o.meat <= 6 && o.sal <= 5 ? 20 : 5;
        if (quizAnswers[2] === 1) score += 15;
        if (quizAnswers[2] === 2) score += o.meat >= 8 || o.sw >= 8 ? 20 : 8;

        if (quizAnswers[3] === 0) score += o.sal >= 4 && o.sal <= 7 ? 20 : 8;
        if (quizAnswers[3] === 1) score += o.sw >= 6 || o.meat >= 7 ? 20 : 8;
        if (quizAnswers[3] === 2) score += o.sal <= 6 && o.iod <= 6 ? 20 : 8;

        const classicIds = ['finedeclaire', 'gillardeau', 'speciale'];
        const uniqueIds = ['gold', 'eleonora', 'amulet', 'boudeuse'];
        if (quizAnswers[4] === 0) score += classicIds.includes(o.id) ? 20 : 5;
        if (quizAnswers[4] === 1) score += uniqueIds.includes(o.id) ? 20 : 5;
        if (quizAnswers[4] === 2) score += 10;

        if (quizAnswers[5] === 0) score += o.origin.flag === '🇫🇷' ? 20 : 3;
        if (quizAnswers[5] === 1) score += o.origin.flag === '🇮🇪' ? 20 : 3;
        if (quizAnswers[5] === 2) score += 12;

        return { oyster: o, score: Math.min(Math.round(score), 100) };
    }).sort((a, b) => b.score - a.score);

    const best = scored[0];

    card.innerHTML = `
        <button class="quiz-close" id="quizCloseBtn2">✕</button>
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:100%"></div></div>
        <div class="quiz-result">
            <div class="quiz-result-icon">🦪</div>
            <div class="quiz-result-name">${best.oyster.name}</div>
            <div class="quiz-result-badge">${best.oyster.badge}</div>
            <div class="quiz-result-match">${best.score}% ${t.quiz_match}</div>
            <div class="quiz-result-desc">${best.oyster.desc[currentLang].replace(/<[^>]*>/g, '')}</div>
            <div class="quiz-result-price">${best.oyster.price} MDL</div>
            <button class="quiz-btn" id="quizAgain">${t.quiz_restart}</button>
            <button class="quiz-btn-secondary" id="quizViewOyster">${best.oyster.name} →</button>
        </div>
    `;

    document.getElementById('quizCloseBtn2').addEventListener('click', () => {
        document.getElementById('quizOverlay').classList.remove('active');
    });

    document.getElementById('quizAgain').addEventListener('click', () => {
        quizStep = 0;
        quizAnswers = [];
        renderQuiz();
    });

    document.getElementById('quizViewOyster').addEventListener('click', () => {
        document.getElementById('quizOverlay').classList.remove('active');
        quizStep = 0;
        quizAnswers = [];
        showOyster(best.oyster.id);
    });
}

function showOyster(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const card = document.getElementById('card-' + id);
    const tab  = document.querySelector(`.tab[data-target="${id}"]`);
    if (!card || !tab) return;
    card.classList.add('active');
    tab.classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    activateBars(card);
}

function handleHash() {
    const hash = window.location.hash.replace('#', '').toLowerCase();
    const valid = OYSTERS.find(o => o.id === hash);
    showOyster(valid ? hash : 'gillardeau');
}

function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
    });
    document.getElementById('section-oysters').style.display = section === 'oysters' ? '' : 'none';
    document.getElementById('section-wines').style.display = section === 'wines' ? '' : 'none';

    if (section === 'oysters') handleHash();
    if (section === 'wines') { renderWineFilters(); renderWines(); }
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('oyster_lang', lang);
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.querySelectorAll('[data-t]').forEach(el => {
        const key = el.getAttribute('data-t');
        if (UI[lang][key]) el.textContent = UI[lang][key];
    });
    renderTabs();
    renderCards();
    renderCompareSelects();
    switchSection(currentSection);
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchSection(btn.dataset.section));
    });

    document.getElementById('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (btn) showOyster(btn.dataset.target);
    });

    document.getElementById('wine-filters').addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (chip) {
            currentWineFilter = chip.dataset.filter;
            renderWineFilters();
            renderWines();
        }
    });

    document.getElementById('quizTrigger').addEventListener('click', () => {
        quizStep = 0;
        quizAnswers = [];
        renderQuiz();
    });

    document.getElementById('quizOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('active');
            quizStep = 0;
            quizAnswers = [];
        }
    });

    document.getElementById('compareTrigger').addEventListener('click', () => {
        document.getElementById('compareOverlay').classList.add('active');
    });

    document.getElementById('compareClose').addEventListener('click', () => {
        document.getElementById('compareOverlay').classList.remove('active');
    });

    document.getElementById('compareOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('active');
        }
    });

    document.getElementById('compareBtn').addEventListener('click', runCompare);

    renderCompareSelects();
    setLanguage(currentLang);
    handleHash();
});

window.addEventListener('hashchange', handleHash);
</script>
</body>
</html>

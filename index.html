<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oyster's LAB — Гастрономический Гид</title>
    <meta name="description" content="Гастрономический гид по устрицам и винам Oyster's LAB.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');

        :root {
            --bg:        #060a10;
            --bg-card:   #0c1118;
            --surface:   #111820;
            --surface-2: #171f2a;
            --surface-3: #1f2b3a;
            --gold:      #d4b062;
            --gold-light:#e8cc8a;
            --gold-dim:  rgba(212,176,98,0.08);
            --gold-line: rgba(212,176,98,0.18);
            --gold-glow: rgba(212,176,98,0.04);
            --text:      #f0ece4;
            --text-sec:  #c8c0b4;
            --muted:     #7a8fa3;
            --faint:     #1a222e;
            --header-brand: #6ba39f;
            --body-text: #b8c4d0;
            --radius:    20px;
            --radius-sm: 14px;
            --radius-xs: 10px;

            --fs-xs:     0.75rem;
            --fs-sm:     0.875rem;
            --fs-base:   1rem;
            --fs-md:     1.25rem;
            --fs-lg:     1.563rem;
            --fs-xl:     2.9rem;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: var(--fs-base);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        .shell { width: 100%; max-width: 480px; min-height: 100vh; position: relative; overflow-x: hidden; }

        .shell::before {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 480px; height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,176,98,0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        header {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--faint);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6,10,16,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .brand { display: flex; flex-direction: column; }
        .brand h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-lg);
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
        }
        .brand p {
            font-size: var(--fs-xs);
            color: var(--header-brand);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .lang-switch {
            display: inline-flex;
            gap: 3px;
            background: var(--surface);
            padding: 4px;
            border-radius: 24px;
            border: 1px solid var(--faint);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(138, 159, 186, 0.4);
            font-size: var(--fs-xs);
            font-weight: 700;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .lang-btn:hover:not(.active) { color: var(--muted); }

        .lang-btn.active {
            background: var(--gold-dim);
            color: var(--gold);
            border-color: var(--gold-line);
        }

        /* ─── NAV TABS ─── */
        .main-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--faint);
            color: var(--muted);
            font-size: var(--fs-sm);
            font-weight: 600;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            letter-spacing: 0.02em;
        }

        .nav-btn:hover { border-color: var(--gold-line); color: var(--text); }
        .nav-btn.active {
            background: var(--gold-dim);
            color: var(--gold-light);
            border-color: var(--gold-line);
        }

        .nav-icon { font-size: var(--fs-base); }

        /* ─── FILTERS ─── */
        .filters-section {
            padding: 14px 20px 0;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: var(--surface);
            border: 1px solid var(--faint);
            color: var(--muted);
            font-size: var(--fs-sm);
            font-weight: 600;
            padding: 9px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .filter-chip:hover { border-color: var(--gold-line); color: var(--text); }
        .filter-chip.active {
            background: var(--gold-dim);
            color: var(--gold-light);
            border-color: var(--gold-line);
        }

        /* ─── OYSTER TABS ─── */
        .tabs-wrapper { position: relative; }
        .tabs-wrapper::after {
            content: ''; position: absolute;
            right: 0; top: 0; bottom: 0; width: 44px;
            background: linear-gradient(90deg, transparent, var(--bg));
            pointer-events: none;
        }
        .tabs {
            display: flex; overflow-x: auto;
            padding: 12px 20px; gap: 8px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            background: var(--surface); color: var(--muted);
            border: 1px solid var(--faint);
            padding: 10px 20px; border-radius: 20px;
            white-space: nowrap; font-size: var(--fs-sm); font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
            flex-shrink: 0; user-select: none;
            letter-spacing: 0.02em;
        }
        .tab:hover { border-color: var(--gold-line); color: var(--text); }
        .tab.active { background: var(--gold-dim); color: var(--gold-light); border-color: var(--gold-line); }

        /* ─── CARDS ─── */
        .card {
            display: none;
            padding: 0 20px 80px;
            animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .card.active { display: block; }
        .card .info-block { position: relative; z-index: 1; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* hero */
        .hero { text-align: center; padding: 28px 0 20px; position: relative; z-index: 1; }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(212,176,98,0.12), rgba(212,176,98,0.06));
            color: var(--gold-light);
            border: 1px solid rgba(212,176,98,0.25);
            padding: 7px 18px; border-radius: 20px;
            font-size: var(--fs-xs); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 16px;
        }
        .oyster-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-xl); font-weight: 600;
            letter-spacing: 1px; line-height: 1.1; margin-bottom: 16px;
            color: var(--text);
        }

        .price-tag {
            display: inline-flex; align-items: baseline; gap: 6px;
            margin-bottom: 14px;
            background: var(--gold-dim);
            padding: 10px 24px;
            border-radius: 24px;
            border: 1px solid var(--gold-line);
        }
        .price-amount { font-size: var(--fs-lg); font-weight: 800; color: var(--gold-light); }
        .price-unit   { font-size: var(--fs-sm); color: var(--muted); font-weight: 500; }
        .terroir {
            font-size: var(--fs-sm); color: var(--muted);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            letter-spacing: 0.02em;
        }
        .terroir-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); opacity: 0.5; }

        /* block */
        .info-block {
            background: var(--bg-card);
            border: 1px solid var(--faint);
            border-radius: var(--radius); padding: 20px;
            margin-bottom: 14px;
        }
        .block-label {
            font-size: var(--fs-xs); font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        .block-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-line), transparent);
        }

        /* taste bars */
        .taste-row { margin-bottom: 18px; }
        .taste-meta { display: flex; justify-content: space-between; font-size: var(--fs-base); margin-bottom: 8px; }
        .taste-label { font-weight: 600; color: var(--text-sec); }
        .taste-score { color: var(--gold-light); font-weight: 700; font-variant-numeric: tabular-nums; }
        .bar-track { height: 7px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(212,176,98,0.4), var(--gold));
            border-radius: 4px; width: 0%;
            transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
        }
        .scale-hint {
            display: flex; justify-content: space-between;
            font-size: var(--fs-xs); font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: 8px;
        }

        /* description */
        .desc {
            font-size: var(--fs-md);
            line-height: 1.75;
            color: var(--body-text);
            margin-bottom: 18px;
            font-weight: 400;
            letter-spacing: 0.01em;
            padding: 6px 0;
        }
        .desc strong {
            color: var(--text);
            font-weight: 700;
        }

        /* origin */
        .origin-map-line {
            display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--faint);
        }
        .origin-flag {
            font-size: 28px; flex-shrink: 0;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-2);
            border-radius: 12px;
        }
        .origin-place { font-size: var(--fs-base); font-weight: 700; color: var(--text); line-height: 1.3; }
        .origin-region { font-size: var(--fs-sm); color: var(--muted); margin-top: 3px; letter-spacing: 0.02em; }
        .origin-text {
            font-size: var(--fs-base); line-height: 1.75; color: var(--body-text);
            font-weight: 400;
        }
        .origin-text strong { color: var(--text); font-weight: 600; }

        /* facts */
        .facts-list { display: flex; flex-direction: column; gap: 10px; }
        .fact-item {
            display: flex; gap: 12px; align-items: flex-start;
            background: var(--surface-2); border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-xs); padding: 14px 16px;
        }
        .fact-num {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--gold-dim); border: 1px solid var(--gold-line);
            color: var(--gold-light); font-size: var(--fs-xs); font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 2px;
        }
        .fact-text {
            font-size: var(--fs-base); line-height: 1.65; color: var(--body-text);
        }
        .fact-text strong { color: var(--text); font-weight: 600; }

        /* pairing */
        .pairing-intro {
            font-size: var(--fs-sm); color: var(--muted); line-height: 1.65;
            margin-bottom: 18px;
            font-style: italic;
        }
        .drink-list { display: flex; flex-direction: column; gap: 12px; }
        .drink-card {
            display: flex; align-items: flex-start; gap: 14px;
            background: var(--surface-2); border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-sm); padding: 16px;
            transition: all 0.25s ease;
        }
        .drink-card:hover {
            border-color: var(--gold-line);
            background: rgba(212,176,98,0.04);
        }
        .drink-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .drink-icon.white   { background: rgba(255,235,160,0.08); }
        .drink-icon.bubb    { background: rgba(210,190,255,0.08); }
        .drink-icon.rose    { background: rgba(255,160,160,0.08); }
        .drink-icon.sake    { background: rgba(160,230,200,0.08); }
        .drink-icon.mineral { background: rgba(140,200,255,0.08); }
        .drink-name   { font-size: var(--fs-base); font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.35; }
        .drink-why    { font-size: var(--fs-sm); color: var(--muted); line-height: 1.55; }
        .drink-tag {
            display: inline-block;
            background: var(--gold-dim); color: var(--gold-light);
            border: 1px solid var(--gold-line);
            padding: 4px 12px; border-radius: 8px;
            font-size: var(--fs-xs); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: 8px; white-space: nowrap;
        }

        /* ─── WINE SECTION ─── */
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: var(--fs-lg); font-weight: 600;
            padding: 24px 20px 12px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .wine-grid {
            padding: 0 20px 80px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .wine-card {
            background: var(--bg-card);
            border: 1px solid var(--faint);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .wine-card:hover { border-color: var(--gold-line); }

        .wine-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }

        .wine-name {
            font-size: var(--fs-base); font-weight: 700; color: var(--text);
            line-height: 1.35;
        }

        .wine-type-badge {
            font-size: var(--fs-xs); font-weight: 700;
            padding: 5px 12px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.06em;
            flex-shrink: 0; margin-left: 8px;
        }
        .wine-type-badge.white   { background: rgba(255,235,160,0.10); color: var(--gold-light); }
        .wine-type-badge.red     { background: rgba(224,122,122,0.10); color: #e07a7a; }
        .wine-type-badge.rose    { background: rgba(255,160,160,0.10); color: #ffa0a0; }
        .wine-type-badge.spark   { background: rgba(210,190,255,0.10); color: #d2beff; }
        .wine-type-badge.dessert { background: rgba(255,200,120,0.10); color: #ffc878; }

        .wine-region {
            font-size: var(--fs-sm); color: var(--muted); margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .wine-desc {
            font-size: var(--fs-sm); color: var(--body-text); line-height: 1.65;
            margin-bottom: 14px;
            font-weight: 400;
        }

        .wine-oysters {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding-top: 12px;
            border-top: 1px solid var(--faint);
        }

        .wine-oyster-tag {
            font-size: var(--fs-xs); font-weight: 600;
            padding: 5px 12px; border-radius: 8px;
            background: var(--gold-dim); color: var(--gold-light);
            border: 1px solid var(--gold-line);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .wine-oyster-tag:hover {
            background: var(--gold-line);
            color: var(--text);
        }

        /* ─── COMBO SECTION ─── */
        .combo-card {
            background: var(--bg-card);
            border: 1px solid var(--gold-line);
            border-radius: var(--radius);
            padding: 20px;
            margin: 0 20px 14px;
        }

        .combo-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--faint);
        }

        .combo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--gold-dim);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .combo-title {
            font-size: var(--fs-base); font-weight: 700; color: var(--text);
        }

        .combo-subtitle {
            font-size: var(--fs-sm); color: var(--muted); margin-top: 2px;
        }

        .combo-pair {
            display: flex; gap: 10px; align-items: stretch;
        }

        .combo-item {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .combo-item-label {
            font-size: var(--fs-xs); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--gold); margin-bottom: 8px;
        }

        .combo-item-name {
            font-size: var(--fs-base); font-weight: 700; color: var(--text);
            line-height: 1.35; margin-bottom: 5px;
        }

        .combo-item-detail {
            font-size: var(--fs-sm); color: var(--muted); line-height: 1.45;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 14px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: var(--fs-md);
            line-height: 1.6;
            font-weight: 500;
        }

        /* ─── RESPONSIVE ─── */
        @media (min-width: 481px) {
            body { padding: 20px 0; }
            .shell {
                border-radius: 28px;
                border: 1px solid var(--faint);
                overflow: hidden;
                box-shadow: 0 20px 80px rgba(0,0,0,0.4);
            }
            header { border-radius: 28px 28px 0 0; }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>
<div class="shell">

    <header>
        <div class="header-top">
            <div class="brand">
                <h1>Oyster's LAB</h1>
                <p>from the seabed</p>
            </div>
            <div class="lang-switch" id="langSwitch">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="ro">RO</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
        <div class="main-nav">
            <button class="nav-btn active" data-section="oysters"><span class="nav-icon">🦪</span> <span data-t="nav_oysters">Устрицы</span></button>
            <button class="nav-btn" data-section="wines"><span class="nav-icon">🍷</span> <span data-t="nav_wines">Вина</span></button>
            <button class="nav-btn" data-section="combos"><span class="nav-icon">✨</span> <span data-t="nav_combos">Пэйринги</span></button>
        </div>
    </header>

    <!-- OYSTERS SECTION -->
    <div id="section-oysters">
        <div class="tabs-wrapper">
            <div class="tabs" id="tabs"></div>
        </div>
        <div id="cards-container"></div>
    </div>

    <!-- WINES SECTION -->
    <div id="section-wines" style="display:none;">
        <div class="filters-section">
            <div class="filter-row" id="wine-filters"></div>
        </div>
        <div class="wine-grid" id="wine-grid"></div>
    </div>

    <!-- COMBOS SECTION -->
    <div id="section-combos" style="display:none;">
        <div id="combos-container"></div>
    </div>

</div>

<script>
const UI = {
    ru: {
        taste: 'Вкусовой профиль', origin: 'Происхождение', pairing: 'Идеальные напитки',
        facts: 'Интересные факты', low: '− слабо', high: 'интенсивно +', unit: '/ шт.',
        sal: 'Солёность', iod: 'Йодистость', sw: 'Сладость', meat: 'Мясистость',
        nav_oysters: 'Устрицы', nav_wines: 'Вина', nav_combos: 'Пэйринги',
        wine_region: 'Регион', wine_with: 'Подходит к', perfect: 'Идеальный пэйринг',
        all: 'Все', white: 'Белые', red: 'Красные', rose: 'Розовые', sparkling: 'Игристые',
        combo_oyster: 'Устрица', combo_wine: 'Вино', combo_why: 'Почему этот пэйринг'
    },
    ro: {
        taste: 'Profil Gustativ', origin: 'Origine', pairing: 'Băuturi Ideale',
        facts: 'Fapte Interesante', low: '− slab', high: 'intens +', unit: '/ buc.',
        sal: 'Salinitate', iod: 'Iod', sw: 'Dulceață', meat: 'Cărnozitate',
        nav_oysters: 'Stridii', nav_wines: 'Vinuri', nav_combos: 'Asocieri',
        wine_region: 'Regiune', wine_with: 'Se potrivește cu', perfect: 'Asociere ideală',
        all: 'Toate', white: 'Albe', red: 'Roșii', rose: 'Rosé', sparkling: 'Spumant',
        combo_oyster: 'Stridie', combo_wine: 'Vin', combo_why: 'De ce această asociere'
    },

let currentLang = localStorage.getItem('oyster_lang') || 'ru';
let currentSection = 'oysters';
let currentWineFilter = 'all';

function renderTabs() {
    const t = UI[currentLang];
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = OYSTERS.map(o => `
        <button class="tab" data-target="${o.id}">${o.name}</button>
    `).join('');
}

function renderCards() {
    const t = UI[currentLang];
    const TASTE_LABELS = [
        { key: 'sal',  name: t.sal },
        { key: 'iod',  name: t.iod },
        { key: 'sw',   name: t.sw },
        { key: 'meat', name: t.meat }
    ];

    const container = document.getElementById('cards-container');
    container.innerHTML = OYSTERS.map((o, i) => `
        <div id="card-${o.id}" class="card">
            <div class="hero">
                <span class="badge">${o.badge}</span>
                <h2 class="oyster-name">${o.name}</h2>
                <div class="price-tag">
                    <span class="price-amount">${o.price} MDL</span>
                    <span class="price-unit">${t.unit}</span>
                </div>
                <p class="terroir">
                    <span class="terroir-dot"></span>
                    ${o.terroir[currentLang]}
                </p>
            </div>

            <div class="info-block">
                <div class="block-label">${t.taste}</div>
                ${TASTE_LABELS.map(lb => `
                    <div class="taste-row">
                        <div class="taste-meta">
                            <span class="taste-label">${lb.name}</span>
                            <span class="taste-score">${o[lb.key]}/10</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" data-val="${o[lb.key] * 10}"></div>
                        </div>
                    </div>
                `).join('')}
                <div class="scale-hint"><span>${t.low}</span><span>${t.high}</span></div>
            </div>

            <p class="desc">${o.desc[currentLang]}</p>

            <div class="info-block">
                <div class="block-label">${t.origin}</div>
                <div class="origin-map-line">
                    <span class="origin-flag">${o.origin.flag}</span>
                    <div>
                        <div class="origin-place">${o.origin.place[currentLang]}</div>
                        <div class="origin-region">${o.origin.region[currentLang]}</div>
                    </div>
                </div>
                <p class="origin-text">${o.origin.text[currentLang]}</p>
            </div>

            <div class="info-block">
                <div class="block-label">${t.pairing}</div>
                <p class="pairing-intro">${o.pairingIntro[currentLang]}</p>
                <div class="drink-list">
                    ${o.drinks.map(d => `
                        <div class="drink-card">
                            <div class="drink-icon ${d.type}">${d.icon}</div>
                            <div>
                                <div class="drink-name">${d.name}</div>
                                <div class="drink-why">${d.why[currentLang]}</div>
                                <span class="drink-tag">${d.tag[currentLang]}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="info-block">
                <div class="block-label">${t.facts}</div>
                <div class="facts-list">
                    ${o.facts[currentLang].map((f, fi) => `
                        <div class="fact-item">
                            <div class="fact-num">${fi + 1}</div>
                            <p class="fact-text">${f}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function renderWineFilters() {
    const t = UI[currentLang];
    const filters = [
        { key: 'all', label: t.all },
        { key: 'white', label: t.white },
        { key: 'rose', label: t.rose },
        { key: 'spark', label: t.sparkling }
    ];
    document.getElementById('wine-filters').innerHTML = filters.map(f => `
        <button class="filter-chip ${f.key === currentWineFilter ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>
    `).join('');
}

function renderWines() {
    const t = UI[currentLang];
    const filtered = currentWineFilter === 'all'
        ? WINES
        : WINES.filter(w => w.type === currentWineFilter);

    const grid = document.getElementById('wine-grid');

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🍷</div><div class="empty-text">Нет вин в этой категории</div></div>`;
        return;
    }

    const typeLabels = {
        white: { ru: 'Белое', ro: 'Alb', en: 'White' },
        rose: { ru: 'Розе', ro: 'Rosé', en: 'Rosé' },
        spark: { ru: 'Игристое', ro: 'Spumant', en: 'Sparkling' }
    };

    grid.innerHTML = filtered.map(w => {
        const pairOysters = w.pairs.map(pid => OYSTERS.find(o => o.id === pid)).filter(Boolean);
        return `
            <div class="wine-card">
                <div class="wine-top">
                    <div class="wine-name">${w.name}</div>
                    <span class="wine-type-badge ${w.type}">${typeLabels[w.type][currentLang]}</span>
                </div>
                <div class="wine-region">${w.region}</div>
                <div class="wine-desc">${w.desc[currentLang]}</div>
                <div class="wine-oysters">
                    ${pairOysters.map(o => `
                        <span class="wine-oyster-tag" data-oyster="${o.id}">${o.name}</span>
                    `).join('')}
                </div>
            </div>
        `;
    }).join('');

    grid.querySelectorAll('.wine-oyster-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            switchSection('oysters');
            setTimeout(() => showOyster(tag.dataset.oyster), 100);
        });
    });
}

function renderCombos() {
    const t = UI[currentLang];
    const container = document.getElementById('combos-container');

    const combos = [];
    WINES.forEach(w => {
        w.pairs.forEach(pid => {
            const oyster = OYSTERS.find(o => o.id === pid);
            if (oyster && w.type === 'white' && w.name.includes('Purcari')) {
                combos.push({ oyster, wine: w });
            }
        });
    });

    const seen = new Set();
    const uniqueCombos = combos.filter(c => {
        const key = c.oyster.id + '-' + c.wine.name;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });

    if (uniqueCombos.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">Пока нет пэйрингов</div></div>`;
        return;
    }

    container.innerHTML = uniqueCombos.map(c => `
        <div class="combo-card">
            <div class="combo-header">
                <div class="combo-icon">🦪🍷</div>
                <div>
                    <div class="combo-title">${c.oyster.name} + ${c.wine.name}</div>
                    <div class="combo-subtitle">${c.wine.region}</div>
                </div>
            </div>
            <div class="combo-pair">
                <div class="combo-item">
                    <div class="combo-item-label">${t.combo_oyster}</div>
                    <div class="combo-item-name">${c.oyster.name}</div>
                    <div class="combo-item-detail">${c.oyster.badge} · ${c.oyster.price} MDL</div>
                </div>
                <div class="combo-item">
                    <div class="combo-item-label">${t.combo_wine}</div>
                    <div class="combo-item-name">${c.wine.name}</div>
                    <div class="combo-item-detail">${c.wine.region}</div>
                </div>
            </div>
        </div>
    `).join('');

    container.querySelectorAll('.combo-title').forEach((el, i) => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
            switchSection('oysters');
            setTimeout(() => showOyster(uniqueCombos[i].oyster.id), 100);
        });
    });
}

function activateBars(cardEl) {
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            cardEl.querySelectorAll('.bar-fill').forEach(b => {
                b.style.width = b.getAttribute('data-val') + '%';
            });
        });
    });
}

function showOyster(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const card = document.getElementById('card-' + id);
    const tab  = document.querySelector(`.tab[data-target="${id}"]`);
    if (!card || !tab) return;
    card.classList.add('active');
    tab.classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    activateBars(card);
}

function handleHash() {
    const hash = window.location.hash.replace('#', '').toLowerCase();
    const valid = OYSTERS.find(o => o.id === hash);
    showOyster(valid ? hash : 'josephine');
}

function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
    });
    document.getElementById('section-oysters').style.display = section === 'oysters' ? '' : 'none';
    document.getElementById('section-wines').style.display = section === 'wines' ? '' : 'none';
    document.getElementById('section-combos').style.display = section === 'combos' ? '' : 'none';

    if (section === 'oysters') handleHash();
    if (section === 'wines') { renderWineFilters(); renderWines(); }
    if (section === 'combos') renderCombos();
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('oyster_lang', lang);
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.querySelectorAll('[data-t]').forEach(el => {
        const key = el.getAttribute('data-t');
        if (UI[lang][key]) el.textContent = UI[lang][key];
    });
    renderTabs();
    renderCards();
    switchSection(currentSection);
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchSection(btn.dataset.section));
    });

    document.getElementById('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (btn) showOyster(btn.dataset.target);
    });

    document.getElementById('wine-filters').addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (chip) {
            currentWineFilter = chip.dataset.filter;
            renderWineFilters();
            renderWines();
        }
    });

    setLanguage(currentLang);
    handleHash();
});

window.addEventListener('hashchange', handleHash);
</script>
